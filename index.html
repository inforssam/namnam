<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중첩 제어 구조 퀴즈</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #3b82f6;
            --success: #10b981;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #1e293b;
            line-height: 1.6;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 1.5rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .header h1 { margin: 0; font-size: 1.25rem; }
        .progress-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.2);
            height: 8px;
            border-radius: 4px;
            margin: 1rem auto 0;
            overflow: hidden;
            display: none; /* Hidden on intro */
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem 5rem;
        }

        .quiz-card {
            background: var(--white);
            border-radius: 1rem;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            display: none;
        }

        .quiz-card.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Intro Screen Styles */
        #intro-screen { text-align: center; }
        .intro-icon { font-size: 4rem; color: var(--accent); margin-bottom: 1.5rem; }
        .intro-title { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 1rem; }
        .intro-desc { font-size: 1.1rem; color: #64748b; margin-bottom: 2rem; }
        .start-btn { 
            padding: 1rem 3rem; 
            font-size: 1.25rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 9999px; 
            cursor: pointer; 
            font-weight: 700;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.05); background: var(--accent); }

        .q-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #dbeafe;
            color: var(--primary);
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .q-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }

        .options { display: grid; gap: 0.75rem; }
        .option {
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover { border-color: var(--accent); background: #eff6ff; }
        .option.selected { border-color: var(--primary); background: var(--primary); color: white; }

        .short-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            outline: none;
        }

        .drag-pool { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 1rem; background: #f1f5f9; border-radius: 0.5rem; margin-bottom: 1rem; min-height: 50px; }
        .drop-zone { min-height: 150px; border: 2px dashed #cbd5e1; border-radius: 0.5rem; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; background: #fff; }
        .item { padding: 0.5rem 1rem; background: var(--accent); color: white; border-radius: 0.25rem; cursor: move; user-select: none; font-weight: bold; }

        .controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: none; /* Hidden on intro */
            gap: 1rem;
            background: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .footer { text-align: center; color: #64748b; font-size: 0.875rem; margin-top: 2rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>중첩 제어 구조 마스터</h1>
    <div class="progress-container" id="progress-wrapper">
        <div id="progress-bar"></div>
    </div>
</div>

<div class="container" id="quiz-container">
    <!-- Intro Screen -->
    <div class="quiz-card active" id="intro-screen">
        <div class="intro-icon"><i class="fas fa-laptop-code"></i></div>
        <div class="intro-title">퀴즈 챌린지 시작</div>
        <p class="intro-desc">
            중첩 제어 구조와 건강 정보 안내 프로그램 제작에 관한<br>
            총 10개의 핵심 문항을 풀어보세요.
        </p>
        <button class="start-btn" onclick="startQuiz()">시작하기</button>
        <div class="footer">copyright 함현중학교 남수현</div>
    </div>
</div>

<div class="controls" id="nav-controls">
    <button class="btn" id="prev-btn" onclick="changeQuestion(-1)"><i class="fas fa-arrow-left"></i> 이전</button>
    <span id="q-counter" style="display: flex; align-items: center; font-weight: bold; min-width: 80px; justify-content: center;">1 / 10</span>
    <button class="btn" id="next-btn" onclick="changeQuestion(1)">다음 <i class="fas fa-arrow-right"></i></button>
</div>

<script>
const quizData = [
    { type: "객관식", q: "제어 구조 안에 또 다른 제어 구조가 포함된 구조의 이름은 무엇입니까?", options: ["순차 구조", "중첩 제어 구조", "단순 선택 구조", "무한 반복 구조"], correct: 1 },
    { type: "단답형", q: "BMI 공식은 '몸무게(kg) / (키(m) * 키(m))'입니다. 여기서 키의 단위는 무엇입니까?", a: "미터" },
    { type: "객관식", q: "반복 구조 내에서 조건에 따라 특정 작업만 수행하고 싶을 때 사용하는 구조는?", options: ["반복 내 선택", "선택 내 반복", "순차 내 반복", "함수 호출"], correct: 0 },
    { type: "단답형", q: "알고리즘의 흐름을 시각적으로 나타내기 위해 기호와 화살표를 사용하는 그림은?", a: "순서도" },
    { type: "객관식", q: "BMI 지수가 25 이상일 때 출력해야 할 올바른 판정 결과는?", options: ["정상", "저체중", "비만", "과체중"], correct: 2 },
    { type: "단답형", q: "엔트리에서 사용자가 입력한 값을 저장하는 블록의 기본 이름은?", a: "대답" },
    { type: "객관식", q: "조건 검사를 할 때 오류를 방지하기 위해 가장 권장되는 순서는?", options: ["큰 범위부터", "작은 범위부터", "알파벳 순으로", "무작위로"], correct: 1 },
    { type: "드래그", q: "BMI 판정 프로그램의 논리 순서를 완성하세요.", items: ["키와 몸무게 입력", "BMI 지수 계산", "조건식으로 비만 판정", "결과 화면 출력"] },
    { type: "드래그", q: "소프트웨어 개발의 일반적인 순서를 완성하세요.", items: ["문제 분석", "알고리즘 설계", "프로그래밍", "디버깅"] },
    { type: "드래그", q: "제어 구조 중 중첩의 예시를 완성하세요.", items: ["선택 구조 내 선택", "반복 구조 내 반복", "반복 구조 내 선택", "선택 구조 내 반복"] }
];

let currentIndex = -1; // -1 means intro screen

function startQuiz() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('progress-wrapper').style.display = 'block';
    document.getElementById('nav-controls').style.display = 'flex';
    currentIndex = 0;
    renderQuiz();
}

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    // Keep intro screen in DOM but hidden
    const cards = container.querySelectorAll('.quiz-card:not(#intro-screen)');
    cards.forEach(c => c.remove());

    quizData.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = `quiz-card ${index === currentIndex ? 'active' : ''}`;
        card.id = `q-${index}`;

        let content = `<div class="q-type">${data.type}</div><div class="q-text">${data.q}</div>`;

        if (data.type === "객관식") {
            content += `<div class="options">`;
            data.options.forEach((opt, oIdx) => {
                content += `<div class="option" onclick="selectOption(${index}, ${oIdx}, this)">${oIdx + 1}. ${opt}</div>`;
            });
            content += `</div>`;
        } else if (data.type === "단답형") {
            content += `<input type="text" class="short-input" placeholder="정답을 여기에 입력하세요...">`;
        } else if (data.type === "드래그") {
            content += `
                <div class="drag-pool" id="pool-${index}">
                    ${shuffleArray([...data.items]).map(item => `<div class="item" draggable="true" ondragstart="drag(event)">${item}</div>`).join('')}
                </div>
                <div class="drop-zone" id="zone-${index}" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div style="color:#94a3b8; text-align:center; margin:auto;">여기로 항목을 끌어다 놓으세요</div>
                </div>
            `;
        }

        content += `<div class="footer">copyright 함현중학교 남수현</div>`;
        card.innerHTML = content;
        container.appendChild(card);
    });
    updateUI();
}

function selectOption(qIdx, oIdx, el) {
    const parent = el.parentElement;
    parent.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
}

function changeQuestion(step) {
    if (currentIndex === -1) return;

    const cards = document.querySelectorAll('.quiz-card:not(#intro-screen)');
    cards[currentIndex].classList.remove('active');
    
    currentIndex += step;
    
    if (currentIndex >= quizData.length) {
        showFinalResult();
        return;
    }

    cards[currentIndex].classList.add('active');
    updateUI();
}

function updateUI() {
    if (currentIndex === -1) return;
    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('q-counter').innerText = `${currentIndex + 1} / ${quizData.length}`;
    document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / quizData.length) * 100}%`;
    
    const nextBtn = document.getElementById('next-btn');
    if (currentIndex === quizData.length - 1) {
        nextBtn.innerHTML = `완료 <i class="fas fa-check"></i>`;
    } else {
        nextBtn.innerHTML = `다음 <i class="fas fa-arrow-right"></i>`;
    }
}

function showFinalResult() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = `
        <div class="quiz-card active" style="text-align:center;">
            <i class="fas fa-trophy" style="font-size: 5rem; color: #fbbf24; margin-bottom: 1rem;"></i>
            <h2>학습을 완료했습니다!</h2>
            <p>중첩 제어 구조의 개념을 마스터하셨습니다.</p>
            <button class="start-btn" style="margin-top:20px;" onclick="location.reload()">처음으로 돌아가기</button>
            <div class="footer">copyright 함현중학교 남수현</div>
        </div>
    `;
    document.getElementById('nav-controls').style.display = 'none';
    document.getElementById('progress-bar').style.width = '100%';
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function allowDrop(ev) { ev.preventDefault(); }
function drag(ev) { ev.dataTransfer.setData("text", ev.target.innerText); ev.target.id = "dragging-now"; }
function drop(ev) {
    ev.preventDefault();
    const data = ev.dataTransfer.getData("text");
    const draggingEl = document.getElementById("dragging-now");
    const dropZone = ev.target.closest('.drop-zone');
    
    if (dropZone && draggingEl) {
        const placeholder = dropZone.querySelector('div');
        if (placeholder) placeholder.style.display = 'none';
        dropZone.appendChild(draggingEl);
        draggingEl.removeAttribute('id');
    }
}
</script>

</body>
</html>
