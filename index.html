<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중첩 제어 구조 퀴즈</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #1e293b;
            line-height: 1.6;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 1.5rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .header h1 { margin: 0; font-size: 1.25rem; }
        .progress-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.2);
            height: 8px;
            border-radius: 4px;
            margin: 1rem auto 0;
            overflow: hidden;
            display: none;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem 5rem;
        }

        .quiz-card {
            background: var(--white);
            border-radius: 1rem;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            display: none;
        }

        .quiz-card.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Intro Screen */
        #intro-screen { text-align: center; }
        .intro-icon { font-size: 4rem; color: var(--accent); margin-bottom: 1.5rem; }
        .intro-title { font-size: 2rem; font-weight: 800; color: var(--primary); margin-bottom: 1rem; }
        .intro-desc { font-size: 1.1rem; color: #64748b; margin-bottom: 2rem; }
        
        /* Quiz Elements */
        .q-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #dbeafe;
            color: var(--primary);
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .q-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }

        .options { display: grid; gap: 0.75rem; }
        .option {
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover:not(.disabled) { border-color: var(--accent); background: #eff6ff; }
        .option.selected { border-color: var(--primary); background: #e0e7ff; }
        .option.correct { border-color: var(--success); background: #ecfdf5; color: #065f46; font-weight: bold; }
        .option.wrong { border-color: var(--error); background: #fef2f2; color: #991b1b; }
        .option.disabled { cursor: default; }

        .short-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
        }
        .short-input:disabled { background: #f1f5f9; }

        /* Drag and Drop */
        .drag-pool { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 1rem; background: #f1f5f9; border-radius: 0.5rem; margin-bottom: 1rem; min-height: 50px; }
        .drop-zone { min-height: 150px; border: 2px dashed #cbd5e1; border-radius: 0.5rem; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; background: #fff; }
        .item { padding: 0.5rem 1rem; background: var(--accent); color: white; border-radius: 0.25rem; cursor: move; user-select: none; font-weight: bold; }
        .item.locked { cursor: default; opacity: 0.8; }

        /* Feedback Area */
        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            font-weight: 600;
        }
        .feedback.correct { display: block; background: #ecfdf5; color: #065f46; border: 1px solid var(--success); }
        .feedback.wrong { display: block; background: #fef2f2; color: #991b1b; border: 1px solid var(--error); }

        /* Navigation & Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
        }
        .btn-check { background: var(--accent); color: white; }
        .btn-check:hover { background: var(--primary); }
        .btn-next { background: var(--success); color: white; display: none; }
        
        .start-btn { 
            padding: 1rem 3rem; 
            font-size: 1.25rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 9999px; 
            cursor: pointer; 
            font-weight: 700;
        }

        .controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: white;
            padding: 0.5rem 1.5rem;
            border-radius: 9999px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        .footer { text-align: center; color: #64748b; font-size: 0.875rem; margin-top: 2rem; }
    </style>
</head>
<body>

<div class="header">
    <h1>중첩 제어 구조 마스터</h1>
    <div class="progress-container" id="progress-wrapper">
        <div id="progress-bar"></div>
    </div>
</div>

<div class="container" id="quiz-container">
    <!-- Intro Screen -->
    <div class="quiz-card active" id="intro-screen">
        <div class="intro-icon"><i class="fas fa-check-double"></i></div>
        <div class="intro-title">중첩 제어 구조 퀴즈</div>
        <p class="intro-desc">
            문제를 풀 때마다 정답을 즉시 확인하고 피드백을 받습니다.<br>
            모든 문제를 완벽하게 이해해 봅시다!
        </p>
        <button class="start-btn" onclick="startQuiz()">퀴즈 시작하기</button>
        <div class="footer">copyright 함현중학교 남수현</div>
    </div>
</div>

<div class="controls" id="nav-info">
    <span id="q-counter">1 / 10</span>
</div>

<script>
const quizData = [
    { type: "객관식", q: "제어 구조 안에 또 다른 제어 구조가 포함된 구조의 이름은 무엇입니까?", options: ["순차 구조", "중첩 제어 구조", "단순 선택 구조", "무한 반복 구조"], correct: 1, explanation: "중첩 제어 구조는 제어 구조(선택, 반복 등) 내부에 또 다른 제어 구조가 들어있는 형태를 말합니다." },
    { type: "단답형", q: "BMI 공식은 '몸무게(kg) / (키(m) * 키(m))'입니다. 여기서 키의 단위는 무엇입니까?", a: ["미터", "m"], explanation: "BMI 계산 시 키의 단위는 미터(m)를 사용해야 정확한 수치가 나옵니다." },
    { type: "객관식", q: "반복 구조 내에서 조건에 따라 특정 작업만 수행하고 싶을 때 사용하는 구조는?", options: ["반복 내 선택", "선택 내 반복", "순차 내 반복", "함수 호출"], correct: 0, explanation: "반복문이 돌아가는 동안 특정 조건일 때만 작업을 실행하므로 '반복 구조 내의 선택 구조'입니다." },
    { type: "단답형", q: "알고리즘의 흐름을 시각적으로 나타내기 위해 기호와 화살표를 사용하는 그림은?", a: ["순서도"], explanation: "순서도(Flowchart)는 약속된 기호를 사용하여 알고리즘의 절차를 시각적으로 표현한 것입니다." },
    { type: "객관식", q: "BMI 지수가 25 이상일 때 출력해야 할 올바른 판정 결과는?", options: ["정상", "저체중", "비만", "과체중"], correct: 2, explanation: "일반적으로 BMI 18.5 미만은 저체중, 18.5~23 미만은 정상, 23~25 미만은 과체중, 25 이상은 비만으로 판정합니다." },
    { type: "단답형", q: "엔트리에서 사용자가 입력한 값을 저장하는 블록의 기본 이름은?", a: ["대답"], explanation: "엔트리의 '묻고 기다리기' 블록을 사용하면 사용자의 입력값이 '대답'이라는 이름의 특수 변수에 저장됩니다." },
    { type: "객관식", q: "조건 검사를 할 때 중첩 구조에서 오류를 방지하기 위해 권장되는 방식은?", options: ["큰 범위부터 제외", "작은 범위부터 구체화", "알파벳 순으로", "복잡한 식부터"], correct: 1, explanation: "조건문을 짤 때는 가장 구체적이거나 작은 범위의 조건을 먼저 검사해야 논리적 오류를 피하기 쉽습니다." },
    { type: "드래그", q: "BMI 판정 프로그램의 논리 순서를 완성하세요.", items: ["키와 몸무게 입력", "BMI 지수 계산", "조건식으로 비만 판정", "결과 화면 출력"], correct: ["키와 몸무게 입력", "BMI 지수 계산", "조건식으로 비만 판정", "결과 화면 출력"], explanation: "입력 -> 처리(계산/판정) -> 출력의 순서가 알고리즘의 기본 흐름입니다." },
    { type: "드래그", q: "소프트웨어 개발의 일반적인 순서를 완성하세요.", items: ["문제 분석", "알고리즘 설계", "프로그래밍", "디버깅"], correct: ["문제 분석", "알고리즘 설계", "프로그래밍", "디버깅"], explanation: "문제를 먼저 이해하고(분석), 설계를 한 뒤 코딩을 하고(프로그래밍), 오류를 수정(디버깅)합니다." },
    { type: "드래그", q: "제어 구조 중 중첩의 예시 4가지를 완성하세요.", items: ["선택 구조 내 선택", "반복 구조 내 반복", "반복 구조 내 선택", "선택 구조 내 반복"], correct: ["선택 구조 내 선택", "반복 구조 내 반복", "반복 구조 내 선택", "선택 구조 내 반복"], explanation: "선택과 반복 구조는 서로 자유롭게 중첩되어 복잡한 논리를 구현할 수 있습니다." }
];

let currentIndex = 0;
let selectedOptionIdx = null;

function startQuiz() {
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('progress-wrapper').style.display = 'block';
    document.getElementById('nav-info').style.display = 'block';
    renderQuestion();
}

function renderQuestion() {
    const container = document.getElementById('quiz-container');
    const data = quizData[currentIndex];
    
    selectedOptionIdx = null;
    
    let content = `
        <div class="quiz-card active">
            <div class="q-type">${data.type}</div>
            <div class="q-text">${data.q}</div>
            <div class="q-body">
    `;

    if (data.type === "객관식") {
        content += `<div class="options">`;
        data.options.forEach((opt, oIdx) => {
            content += `<div class="option" onclick="handleOptionSelect(${oIdx}, this)">${oIdx + 1}. ${opt}</div>`;
        });
        content += `</div>`;
    } else if (data.type === "단답형") {
        content += `<input type="text" class="short-input" id="answer-input" placeholder="정답을 입력하세요 (예: 미터)">`;
    } else if (data.type === "드래그") {
        content += `
            <div class="drag-pool" id="pool-${currentIndex}">
                ${shuffleArray([...data.items]).map((item, i) => `<div class="item" draggable="true" id="drag-${currentIndex}-${i}" ondragstart="drag(event)">${item}</div>`).join('')}
            </div>
            <div class="drop-zone" id="zone-${currentIndex}" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="placeholder" style="color:#94a3b8; text-align:center; margin:auto;">여기로 항목을 순서대로 끌어다 놓으세요</div>
            </div>
        `;
    }

    content += `
            </div>
            <div id="feedback-${currentIndex}" class="feedback"></div>
            <div class="btn-group">
                <button class="btn btn-check" id="check-btn" onclick="checkAnswer()">정답 확인</button>
                <button class="btn btn-next" id="next-btn" onclick="nextQuestion()">다음 문제 <i class="fas fa-arrow-right"></i></button>
            </div>
            <div class="footer">copyright 함현중학교 남수현</div>
        </div>
    `;

    container.innerHTML = content;
    updateUI();
}

function handleOptionSelect(idx, el) {
    if (document.getElementById('next-btn').style.display === 'block') return;
    const options = el.parentElement.querySelectorAll('.option');
    options.forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    selectedOptionIdx = idx;
}

function checkAnswer() {
    const data = quizData[currentIndex];
    const feedback = document.getElementById(`feedback-${currentIndex}`);
    let isCorrect = false;

    if (data.type === "객관식") {
        if (selectedOptionIdx === null) return;
        const options = document.querySelectorAll('.option');
        isCorrect = selectedOptionIdx === data.correct;
        
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (i === data.correct) opt.classList.add('correct');
            else if (i === selectedOptionIdx) opt.classList.add('wrong');
        });
    } else if (data.type === "단답형") {
        const input = document.getElementById('answer-input');
        const userVal = input.value.trim();
        if (!userVal) return;
        isCorrect = data.a.includes(userVal);
        input.disabled = true;
    } else if (data.type === "드래그") {
        const zone = document.getElementById(`zone-${currentIndex}`);
        const items = Array.from(zone.querySelectorAll('.item')).map(it => it.innerText);
        if (items.length < data.items.length) {
            feedback.innerText = "모든 항목을 배치해 주세요!";
            feedback.className = "feedback wrong";
            return;
        }
        isCorrect = JSON.stringify(items) === JSON.stringify(data.correct);
        zone.querySelectorAll('.item').forEach(it => {
            it.draggable = false;
            it.classList.add('locked');
        });
    }

    if (isCorrect) {
        feedback.innerHTML = `<i class="fas fa-check-circle"></i> 정답입니다! <br><small>${data.explanation}</small>`;
        feedback.className = "feedback correct";
        document.getElementById('check-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    } else {
        feedback.innerHTML = `<i class="fas fa-times-circle"></i> 오답입니다. 다시 한번 생각해보세요!`;
        feedback.className = "feedback wrong";
        if (data.type !== "객관식" && data.type !== "드래그") {
             document.getElementById('answer-input').disabled = false;
        }
        if (data.type === "드래그") {
             // 드래그 오답 시 초기화 로직 (선택사항)
             setTimeout(() => renderQuestion(), 1500);
        }
    }
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < quizData.length) {
        renderQuestion();
    } else {
        showFinalResult();
    }
}

function updateUI() {
    document.getElementById('q-counter').innerText = `${currentIndex + 1} / ${quizData.length}`;
    document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / quizData.length) * 100}%`;
}

function showFinalResult() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = `
        <div class="quiz-card active" style="text-align:center;">
            <i class="fas fa-medal" style="font-size: 5rem; color: #fbbf24; margin-bottom: 1rem;"></i>
            <h2>축하합니다!</h2>
            <p>모든 문제를 풀고 학습을 마쳤습니다.</p>
            <div style="background:#f1f5f9; padding:1.5rem; border-radius:1rem; margin:1.5rem 0;">
                오늘 배운 <strong>중첩 제어 구조</strong>를 실제 코딩에서도 활용해 보세요!
            </div>
            <button class="start-btn" onclick="location.reload()">다시 도전하기</button>
            <div class="footer">copyright 함현중학교 남수현</div>
        </div>
    `;
    document.getElementById('nav-info').style.display = 'none';
}

// Drag and Drop Logic
function allowDrop(ev) { ev.preventDefault(); }
function drag(ev) { 
    if (ev.target.classList.contains('locked')) return;
    ev.dataTransfer.setData("text", ev.target.id); 
}
function drop(ev) {
    ev.preventDefault();
    const id = ev.dataTransfer.getData("text");
    const el = document.getElementById(id);
    const zone = ev.target.closest('.drop-zone');
    
    if (zone && el) {
        const placeholder = zone.querySelector('.placeholder');
        if (placeholder) placeholder.style.display = 'none';
        zone.appendChild(el);
    }
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}
</script>

</body>
</html>
